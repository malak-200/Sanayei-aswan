<div id="page-unified-orders" class="page">
    <div class="section" style="padding-top:2rem;max-width:800px;margin:0 auto;">
      <h2 style="color:#C8873A;font-size:20px;margin:0 0 18px;">&#x1F4CB; طلباتي</h2>
      <div id="uord-client-view">
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
          <button onclick="uordFilterClient('all')" id="ucord-tab-all" class="uord-tab uord-tab-active">الكل</button>
          <button onclick="uordFilterClient('pending')" id="ucord-tab-pending" class="uord-tab">جديدة</button>
          <button onclick="uordFilterClient('accepted')" id="ucord-tab-accepted" class="uord-tab">مقبولة</button>
          <button onclick="uordFilterClient('done')" id="ucord-tab-done" class="uord-tab">منجزة</button>
          <button onclick="uordFilterClient('cancelled')" id="ucord-tab-cancelled" class="uord-tab">ملغية</button>
        </div>
        <div id="uord-client-list" style="display:flex;flex-direction:column;gap:12px;">
          <p style="color:rgba(255,255,255,0.3);text-align:center;padding:2rem;">جاري التحميل...</p>
        </div>
        <div style="text-align:center;margin-top:20px;">
          <button class="btn-primary" onclick="showPage('request')" style="justify-content:center;">اطلب خدمة
            جديدة</button>
        </div>
      </div>
      <div id="uord-worker-view" style="display:none;">
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
          <button onclick="uordFilterWorker('all')" id="uwreq-tab-all" class="uord-tab uord-tab-active">الكل</button>
          <button onclick="uordFilterWorker('pending')" id="uwreq-tab-pending" class="uord-tab">جديدة</button>
          <button onclick="uordFilterWorker('accepted')" id="uwreq-tab-accepted" class="uord-tab">مقبولة</button>
          <button onclick="uordFilterWorker('done')" id="uwreq-tab-done" class="uord-tab">منجزة</button>
        </div>
        <div id="uord-worker-list" style="display:flex;flex-direction:column;gap:12px;">
          <p style="color:rgba(255,255,255,0.3);text-align:center;padding:2rem;">لا توجد طلبات</p>
        </div>
      </div>
    </div>
  </div>
