<div id="page-client-orders" class="page">
    <div class="section" style="padding-top:2rem;max-width:800px;margin:0 auto;">
      <div
        style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <button onclick="goToMyProfile()"
            style="background:none;border:none;color:#C8873A;font-family:Cairo,sans-serif;font-size:22px;cursor:pointer;padding:0;">→</button>
          <h2 style="color:#C8873A;font-size:20px;margin:0;">📋 طلباتي</h2>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button onclick="filterClientOrders('all')" id="cord-tab-all" class="tab-btn active"
            style="font-size:12px;padding:6px 12px;">الكل</button>
          <button onclick="filterClientOrders('pending')" id="cord-tab-pending" class="tab-btn"
            style="font-size:12px;padding:6px 12px;">جديدة</button>
          <button onclick="filterClientOrders('accepted')" id="cord-tab-accepted" class="tab-btn"
            style="font-size:12px;padding:6px 12px;">مقبولة</button>
          <button onclick="filterClientOrders('done')" id="cord-tab-done" class="tab-btn"
            style="font-size:12px;padding:6px 12px;">منجزة</button>
          <button onclick="filterClientOrders('cancelled')" id="cord-tab-cancelled" class="tab-btn"
            style="font-size:12px;padding:6px 12px;">ملغية</button>
        </div>
      </div>
      <div id="client-orders-list" style="display:flex;flex-direction:column;gap:12px;">
        <p style="color:rgba(255,255,255,0.3);text-align:center;padding:2rem;">جاري التحميل...</p>
      </div>
      <div style="text-align:center;margin-top:20px;">
        <button class="btn-primary" onclick="showPage('request')" style="justify-content:center;">🛠️ اطلب خدمة
          جديدة</button>
      </div>
    </div>
  </div>
